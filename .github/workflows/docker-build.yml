name: Build Backend Image

on:
  push:
    branches: [ "main", "master" ]

jobs:
  build:

    runs-on: ubuntu-latest

    permissions:
      contents: read
      packages: write

    steps:

      # Checkout repo
      - uses: actions/checkout@v4

      # Login ke GHCR
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # Build image
      - name: Build Docker image
        run: |
          docker build -t ghcr.io/${{ github.repository_owner }}/online-shop-api .

      # Push image
      - name: Push Docker image
        run: |
          docker push ghcr.io/${{ github.repository_owner }}/online-shop-api