name: Build Backend Image

on:
  push:
    branches: ["main", "master", "stg"]

jobs:
  build:
    runs-on: ubuntu-latest

    permissions:
      contents: read
      packages: write

    steps:
      # Checkout repo
      - uses: actions/checkout@v4

      # Login ke GHCR
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # Determine image tag based on branch
      - name: Set image tag
        id: tag
        run: |
          if [ "${{ github.ref_name }}" = "stg" ]; then
            echo "tag=staging" >> $GITHUB_OUTPUT                                                                     
          else                                                                                                       
            echo "tag=latest" >> $GITHUB_OUTPUT
          fi

      - name: Build Docker image
        run: |
          docker build -t ghcr.io/${{ github.repository_owner }}/online-shop-api:${{ steps.tag.outputs.tag }} .

      - name: Push Docker image
        run: |
          docker push ghcr.io/${{ github.repository_owner }}/online-shop-api:${{ steps.tag.outputs.tag }}

      # Deploy to VPS
      - name: Deploy to VPS
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ secrets.VPS_PORT }}
          script: |
            cd /home/ubuntu/umkm
            docker compose pull ${{ steps.tag.outputs.tag == 'staging' && 'api-stg' || 'api' }}
            docker compose up -d --force-recreate ${{ steps.tag.outputs.tag == 'staging' && 'api-stg' || 'api' }}
