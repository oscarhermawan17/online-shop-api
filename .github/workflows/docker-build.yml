name: Build Backend Image

on:
  push:
    branches: ["main", "master", "stg"]

jobs:
  build:
    runs-on: ubuntu-latest

    permissions:
      contents: read
      packages: write

    steps:
      # Checkout repo
      - uses: actions/checkout@v4

      # Login ke GHCR
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # Determine image tag based on branch
      - name: Set image tag
        id: tag
        run: |
          if [ "${{ github.ref_name }}" = "stg" ]; then
            echo "tag=staging" >> $GITHUB_OUTPUT                                                                     
          else                                                                                                       
            echo "tag=latest" >> $GITHUB_OUTPUT
          fi

      - name: Build Docker image
        run: |
          docker build -t ghcr.io/${{ github.repository_owner }}/online-shop-api:${{ steps.tag.outputs.tag }} .

      - name: Push Docker image
        run: |
          docker push ghcr.io/${{ github.repository_owner }}/online-shop-api:${{ steps.tag.outputs.tag }}

      # Deploy to VPS
      - name: Deploy to VPS
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ secrets.VPS_PORT }}
          script: |
            set -e
            cd /home/ubuntu/umkm

            SERVICE=${{ steps.tag.outputs.tag == 'staging' && 'api-stg' || 'api' }}
            ENV_FILE=${{ steps.tag.outputs.tag == 'staging' && '.env.stg' || '.env.prod' }}
            IMAGE=ghcr.io/${{ github.repository_owner }}/online-shop-api:${{ steps.tag.outputs.tag }}

            # Pull latest image
            docker compose pull $SERVICE

            # Run db push BEFORE starting the container
            # Uses the new image so schema is always in sync with the code
            docker run --rm \
              --network umkm_default \
              --env-file /home/ubuntu/umkm/$ENV_FILE \
              $IMAGE \
              npx prisma db push --accept-data-loss

            # Start the container with the new image
            docker compose up -d --force-recreate $SERVICE
