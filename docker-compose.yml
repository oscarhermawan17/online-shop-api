services:
  db:
    image: postgres:16-alpine
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: secret
      POSTGRES_DB: online_shop_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  api:
    build: .
    restart: always
    ports:
      - "3000:5000"
    env_file:
      - .env
    environment:
      - PORT=5000
      - DATABASE_URL=postgresql://postgres:secret@db:5432/online_shop_db?schema=public
    depends_on:
      - db

volumes:
  postgres_data:
